<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موسوعة أنس الشاملة</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --p: #818cf8; --bg: #020617; --card: rgba(30, 41, 59, 0.8); }
        body { margin: 0; font-family: system-ui; background: var(--bg); color: white; text-align: center; }
        .credit { font-size: 14px; padding: 15px 0; color: var(--p); font-weight: bold; }
        .nav { position: fixed; bottom: 0; width: 100%; background: rgba(15,23,42,0.95); display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; border-top: 1px solid var(--p); }
        .container { padding: 10px 20px 100px 20px; max-width: 600px; margin: auto; }
        .section { display: none; } .active { display: block; animation: fadeIn 0.4s; }
        .card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 20px; border: 1px solid rgba(129, 140, 248, 0.2); }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 15px; margin-bottom: 15px; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .sebha-btn { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--p); background: none; color: white; font-size: 30px; cursor: pointer; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="credit">إعداد انس اشرف 🚀</div>
    <div class="container">
        <div id="media" class="section active">
            <h2 style="color: var(--p);">🎥 خطب ودروس مختارة</h2>
            <div class="card">
                <div class="video-container"><iframe src="https://www.youtube.com/embed/y2ZDAIyxzNM"></iframe></div>
                <div class="video-container"><iframe src="https://www.youtube.com/embed/-xBeqYEw7qs"></iframe></div>
                <div class="video-container"><iframe src="https://www.youtube.com/embed/LxSwWwBCuHY"></iframe></div>
                <div class="video-container"><iframe src="https://www.youtube.com/embed/WCYUb9lHAyw"></iframe></div>
                <div class="video-container"><iframe src="https://www.youtube.com/embed/BcJDQi48Rxk"></iframe></div>
                <div class="video-container"><iframe src="https://www.youtube.com/embed/x8aJqqJ_c2s"></iframe></div>
            </div>
        </div>
        <div id="sebha" class="section">
            <h2 style="color: var(--p);">📿 السبحة الإلكترونية</h2>
            <div class="card"><button class="sebha-btn" onclick="count()">0</button></div>
        </div>
        <div id="lib" class="section">
            <h2 style="color: var(--p);">📚 المكتبة</h2>
            <div class="card">يحتوي الموقع على 200 حديث و200 سؤال وجواب.</div>
        </div>
    </div>
    <div class="nav">
        <div onclick="showS('media')">🎥</div>
        <div onclick="showS('sebha')">📿</div>
        <div onclick="showS('lib')">📚</div>
    </div>
    <script>
        let n=0; function count(){n++; document.querySelector('.sebha-btn').innerText=n; if(n%33==0) confetti();}
        function showS(id){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0);}
    </script>
</body>
</html>
